<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#3a6b1a"/>
      <stop offset="100%" stop-color="#1a3a08"/>
    </radialGradient>
    <pattern id="batik-fav" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <polygon points="10,2 18,10 10,18 2,10" fill="none" stroke="#c8a84b" stroke-width="0.35" opacity="0.3"/>
    </pattern>
    <!-- Blackletter / Old English style font embedded as path approximation -->
    <!-- We use a heavy condensed serif to mimic the blackletter weight -->
  </defs>

  <!-- Green background -->
  <rect width="200" height="200" rx="38" fill="url(#bg)"/>
  <!-- Subtle batik overlay -->
  <rect width="200" height="200" rx="38" fill="url(#batik-fav)"/>

  <!-- "Musfam" in bold blackletter-weight text -->
  <!-- Using font-family with multiple fallbacks to get closest to the gothic look -->
  <text
    x="100" y="105"
    font-family="'Palatino Linotype', 'Book Antiqua', Palatino, 'Times New Roman', serif"
    font-weight="900"
    font-size="52"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-1"
    style="font-stretch: condensed;">Musfam</text>

  <!-- Thin gold rule -->
  <line x1="38" y1="118" x2="162" y2="118" stroke="#c8a84b" stroke-width="0.8" opacity="0.8"/>

  <!-- "MUSLIM FAMILY" subtitle — small caps style -->
  <text
    x="100" y="133"
    font-family="'Arial Narrow', Arial, sans-serif"
    font-weight="700"
    font-size="11"
    fill="#c8a84b"
    text-anchor="middle"
    letter-spacing="3.5">MUSLIM FAMILY</text>
</svg>
