<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="#1B3D2A"/>

  <!-- Subtle gold ring -->
  <rect x="2" y="2" width="28" height="28" rx="6.5" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>

  <!-- Arabic م (meem) — short form of مسفام -->
  <text x="16" y="22"
        text-anchor="middle"
        font-family="'Amiri', 'Traditional Arabic', serif"
        font-weight="700"
        font-size="18"
        fill="#C9A84C">م</text>
</svg>
