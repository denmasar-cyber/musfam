<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Deep green background -->
  <circle cx="100" cy="100" r="100" fill="#1B3D2A"/>

  <!-- Subtle gold ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>

  <!-- Thin inner ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>

  <!-- Arabic calligraphy: مسفام (Musfam) in elegant Naskh style -->
  <!-- Rendered as vector paths approximating Arabic letterforms -->
  <text x="100" y="112"
        text-anchor="middle"
        font-family="'Amiri', 'Traditional Arabic', 'Arabic Typesetting', serif"
        font-weight="700"
        font-size="52"
        fill="#C9A84C"
        letter-spacing="-1">مسفام</text>

  <!-- Decorative gold dots flanking -->
  <circle cx="38" cy="107" r="2.5" fill="#C9A84C" opacity="0.5"/>
  <circle cx="162" cy="107" r="2.5" fill="#C9A84C" opacity="0.5"/>

  <!-- Thin divider line -->
  <line x1="44" y1="125" x2="156" y2="125" stroke="#C9A84C" stroke-width="0.8" opacity="0.35"/>

  <!-- Tagline -->
  <text x="100" y="143"
        text-anchor="middle"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-weight="600"
        font-size="8"
        fill="#C9A84C"
        letter-spacing="2.5"
        opacity="0.75">MUSLIM FAMILY</text>
</svg>
